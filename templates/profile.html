<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Профиль</title>
        <link rel="stylesheet" href="{{ url_for('static',filename='css/styles.css')}}">
    </head>
    <body>
        
        <div class="mainProfile">
               <p>Привет, {{ username }}</p>
               <p>Твоя цель: {{user['goal']}}</p>
               <form method="POST" action="/profile">
                <input type="number" name="goal" placeholder="цель">
                <button type="submit">Сохранить</button>
               </form>
                <form action="/upload_avatar" method="POST" enctype="multipart/form-data">
                    <input type="file" name="avatar" accept="image/*">
                    <button type="submit">Загрузить фото профиля</button>
                </form>
                {% if user['avatar'] %}
                    <img src="{{url_for('static',filename=user['avatar'])}}?v={{user['id']}}" class="avatar">
                {% else %}
                    <img src="{{url_for('static', filename='images/studentsphoto.jpg')}}" class="studentsPhoto">
                {% endif %}
            </div>
            <div class="sidebar">
            <a href="{{url_for('error')}}" class="name">настя синус</a>
            <ul class="listThings">
                <li><a href="{{url_for('home')}}" class="lighttext">Основная страница</a></li>
                <li><a href="{{url_for('tasks')}}" class="lighttext">Банк заданий</a></li>
                <li><a href="{{url_for('error')}}" class="lighttext">Варианты уровня ЕГЭ</a></li>
                <li><a href="{{url_for('mistakes')}}" class="lighttext">Работа над ошибками</a></li>
                <li><a href="{{url_for('statistics')}}" class="lighttext">Статистика</a></li>
                <li><a href="{{url_for('logout')}}" class="lighttext">Выход</a></li>
                <li></li>
            </ul>
        </div>
        <script src="scripts.js"></script>
    </body>
</html>
