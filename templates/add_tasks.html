<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Основная страница</title>
        <link rel="stylesheet" href="{{ url_for('static',filename='css/styles.css')}}">
    </head>
    <body>
        <h1>Добавить задачу</h1>
        <form method="POST" class="task_adding">
            <input name="number" placeholder="Номер задания">
            <textarea name="text" placeholder="Текст задачи" class="textareas buttons"></textarea>
            <input name="source" placeholder="В каких ЕГЭ была в посл раз">
            <textarea name="solution" placeholder="Решение задачи" class="textareas buttons"></textarea>
            <input name="answer" placeholder="Ответ">
            <button type="submit" class="buttons lightBox">Добавить</button>
            <a href="{{url_for('tasks')}}" class="buttons lightBox" style="font-size:10px;">Отменить</a>
        </form>
        <script src="{{url_for('static',filename='scripts.js')}}"></script> 
    </body>
</html>
